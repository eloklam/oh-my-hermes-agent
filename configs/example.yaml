# Example only. Do not paste API keys into this file.
# Copy values you need into your Hermes config and ~/.hermes/.env.

project:
  name: oh-my-hermes-agent
  purpose: Documented profile and Kanban configuration for Hermes Agent
  runtime: hermes
  not_a:
    - CLI
    - Python package
    - Hermes plugin
    - external plugin loader
    - wrapper runtime

roles:
  default:
    omh_role: orchestrator
    hermes_profile: default
    purpose: strategic coordinator and delegator
    model:
      provider: <your-orchestrator-provider>
      default: <your-orchestrator-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    notes:
      - Some provider accounts reject model IDs with a "-fast" suffix; use the base model ID and set agent.service_tier=fast instead.
      - Orchestrator policy belongs in ~/.hermes/AGENTS.md.

  oracle:
    omh_role: oracle
    hermes_profile: oracle
    purpose: deep reasoning, adversarial review, architecture critique, code review
    model:
      provider: <your-review-provider>
      default: <your-review-model>
    agent:
      service_tier: fast
      reasoning_effort: xhigh

  explorer:
    omh_role: explorer
    hermes_profile: explorer
    purpose: broad codebase exploration and unknown discovery
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    variant_mapping: source design variant=thinking maps to Hermes reasoning_effort=medium for thinking-compatible providers.

  librarian:
    omh_role: librarian
    hermes_profile: librarian
    purpose: source-grounded docs and repo evidence
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    variant_mapping: source design variant=thinking maps to Hermes reasoning_effort=medium for thinking-compatible providers.

  designer:
    omh_role: designer
    hermes_profile: designer
    purpose: UI, visual design, UX critique
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    variant_mapping: source design variant=thinking maps to Hermes reasoning_effort=medium for thinking-compatible providers.

  fixer:
    omh_role: fixer
    hermes_profile: fixer
    purpose: bounded implementation, bug fixing, tests
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    variant_mapping: source design variant=thinking maps to Hermes reasoning_effort=medium for thinking-compatible providers.

  council:
    omh_role: council
    hermes_profile: council
    purpose: multi-model consensus
    model:
      provider: <your-review-provider>
      default: <your-review-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    notes:
      - Use the council profile through Hermes Kanban batch/consensus tasks.
      - source design council uses a fast variant; Hermes maps that to the review model plus service_tier=fast.
      - delegate_task is disabled in this OMH setup.

  observer:
    omh_role: observer
    hermes_profile: observer
    purpose: visual analysis for images, PDFs, and screenshots
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    notes:
      - source design disables observer, but this Hermes setup keeps observer active on the configured worker model for vision/read-only work.
      - delegate_task is disabled in this OMH setup.

  casual:
    omh_role: none
    hermes_profile: casual
    purpose: fast chat buddy for facts and casual conversation
    model:
      provider: <your-worker-provider>
      default: <your-worker-model>
    agent:
      service_tier: fast
      reasoning_effort: medium
    notes:
      - Not part of the serious OMH worker delegation workflow.
      - Delegation toolset may remain enabled; this profile is for informal quick chat only.

providers:
  <your-provider>:
    hermes_provider: <your-worker-provider>
    base_url: <provider-api-base-url>
    key_env: <PROVIDER_API_KEY_ENV>
    default_model: <your-worker-model>
    secret_location: ~/.hermes/.env

model_variant_mapping:
  source: known_good_example
  orchestrator_fast: source design model suffix "-fast" maps to Hermes orchestrator model with agent.service_tier=fast.
  oracle_xhigh: source design oracle variant=xhigh maps to Hermes agent.reasoning_effort=xhigh.
  worker_thinking: source design variant=thinking maps to Hermes agent.reasoning_effort=medium, which makes Hermes send reasoning_effort to thinking-compatible providers.
  observer: source design disables observer, but this Hermes setup keeps observer active on the configured worker model for vision/read-only work.

skills:
  imported_to: ~/.hermes/skills/omh-imports/
  rule: Copy compatible skills into Hermes skills. Do not depend on external runtime paths.

kanban:
  board: oh-my-hermes-agent
  dispatch: hermes kanban --board oh-my-hermes-agent dispatch
  policy: named-profile delegation uses Kanban only; delegate_task/delegation toolset is disabled for all OMH profiles.
  no_self_execution_policy: |
    The default orchestrator must not implement non-trivial work itself.
    It is a delegator, not an executor.
    Work that must be delegated via Kanban:
      - GitHub PR and issue workflows
      - Repository edits, file creation, or code changes
      - Implementation, bug fixes, or tests
      - Research, documentation, or evidence gathering
      - Architecture or security review
      - Config or profile changes
    Work the orchestrator may handle directly:
      - Simple factual replies and quick lookups
      - Tiny edits (single-line typos, trivial corrections)
      - Direct checks and verification commands
      - Clarification questions to the user
  wrong_vs_correct:
    wrong_description: |
      Orchestrator does everything in one turn:
      creates issue, writes fix, commits, opens PR, self-reviews, merges.
    correct_description: |
      Parallel Kanban cards with real profiles:
        - fixer task for the skill, doc, or code change
        - explorer/librarian tasks in parallel for validation and references
        - oracle task as a dependent child for adversarial review
  stalled_worker_recovery:
    rule: Do not silently finish stalled worker work yourself.
    recovery_options:
      - Reclaim the task so the dispatcher can retry it with the same or narrower scope.
      - Reassign to a different profile if the original profile is misconfigured.
      - Create a follow-up child task for the remaining work.
      - Block the task and ask the user for a decision if the stall reason is ambiguous.
    example_command: hermes kanban --board oh-my-hermes-agent reclaim <task_id>
  update_reporting_policy: |
    The orchestrator must proactively report Kanban worker outcomes to the user.
    Do not wait for the user to ask "what happened" or "any updates."
    Rules:
      - After monitoring the board or after any worker finishes, immediately summarize completions, blockers, and status transitions.
      - When a worker completes, report its summary, changed files, and any follow-up tasks created.
      - When a worker blocks, report the blocker reason and ask for the specific decision needed.
      - When a worker stalls (timed_out, crashed, reclaimed), report the stall and the recovery action taken.
      - Keep reports concise but specific: name task IDs, profiles involved, and concrete artifacts.
  board_lifecycle_policy: |
    Reuse the default OMH board for normal work. New boards are rare and require justification.
    Rules:
      - Prefer tenants and workspaces over new boards for isolation.
      - Use stable semantic slugs; no timestamped or per-topic board names.
      - Archive or consolidate completed or temporary boards.
  session_title_hygiene: |
    Once context is clear, set a stable session title using the format:
      YYYY-MM-DD | PROJECT | goal | area
    Avoid repeated renaming. If the runtime has no title command, report the suggested title to the user.
    Do not include sensitive data (API keys, hostnames, PII) in session titles.
  decomposition_policy: |
    The default orchestrator must decompose non-trivial requests into independent workstreams before creating Kanban tasks.
    Do not bundle multiple independent lanes into a single fixer task.
    Example workstreams:
      - UI design + implementation -> designer (parallel) + fixer (depends on designer)
      - Fix blockers + check model variants -> fixer (parallel) + explorer/librarian (parallel)
      - Optional adversarial review -> oracle as a dependent child after fixer completes
  parallel_examples:
    - description: Build a feature with UI
      tasks:
        - assignee: designer
          title: "Design UI for feature X"
          workspace: dir:/repo
        - assignee: fixer
          title: "Implement feature X"
          workspace: dir:/repo
          parents: [designer_task]
    - description: Fix blockers and research alternatives
      tasks:
        - assignee: fixer
          title: "Fix blocker Y"
          workspace: dir:/repo
        - assignee: explorer
          title: "Check model variants"
          workspace: dir:/repo
        - assignee: librarian
          title: "Collect source-grounded evidence"
          workspace: dir:/repo
    - description: Optional review after implementation
      tasks:
        - assignee: fixer
          title: "Implement bounded changes"
          workspace: dir:/repo
        - assignee: oracle
          title: "Adversarial review"
          workspace: dir:/repo
          parents: [fixer_task]
  dependency_shape: |
    explorer   ─╢
                ─╮> fixer ─> oracle
    librarian ─╯
  example_create_and_link:
    - |
      EXP=$(hermes kanban --board oh-my-hermes-agent create "Explore implementation surface" --assignee explorer --workspace dir:/repo --json | jq -r '.id')
      LIB=$(hermes kanban --board oh-my-hermes-agent create "Collect source-grounded references" --assignee librarian --workspace dir:/repo --json | jq -r '.id')
      FIX=$(hermes kanban --board oh-my-hermes-agent create "Implement bounded changes" --assignee fixer --workspace dir:/repo --json | jq -r '.id')
      ORA=$(hermes kanban --board oh-my-hermes-agent create "Final adversarial review" --assignee oracle --workspace dir:/repo --json | jq -r '.id')

      # Link: explorer and librarian parent fixer; fixer parents oracle
      hermes kanban --board oh-my-hermes-agent link "$EXP" "$FIX"
      hermes kanban --board oh-my-hermes-agent link "$LIB" "$FIX"
      hermes kanban --board oh-my-hermes-agent link "$FIX" "$ORA"

      hermes kanban --board oh-my-hermes-agent dispatch
  durable_swarm_mapping:
    explorer: discover files, risks, options, unknowns
    librarian: collect docs and evidence
    fixer: implement bounded changes after discovery
    oracle: final adversarial review
    designer: UI/UX review when needed
    council: multi-model consensus when needed
    observer: visual analysis when needed
    casual: fast chat buddy, not part of serious workflow

setup:
  disable_delegation:
    description: Disable delegate_task for every OMH profile
    commands:
      - hermes --profile default  tools disable delegation
      - hermes --profile fixer    tools disable delegation
      - hermes --profile explorer tools disable delegation
      - hermes --profile librarian tools disable delegation
      - hermes --profile designer tools disable delegation
      - hermes --profile oracle   tools disable delegation
      - hermes --profile observer tools disable delegation
      - hermes --profile council  tools disable delegation
  verify:
    description: Confirm delegation is unavailable in a profile
    command: hermes --profile fixer tools list | grep delegation
    expected: a disabled delegation line, e.g. "✗ disabled  delegation"

deliberately_not_included:
  - external JavaScript plugin hooks
  - external memory plugin
  - delegate_task as an OMH delegation path
  - standalone CLI commands
  - wrapper runtime
